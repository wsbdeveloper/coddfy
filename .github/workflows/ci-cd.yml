name: Backend Deploy
on:
  push:
    branches: [ main ]
    paths: [ 'backend/**' ] # Só roda se mudar algo no backend

jobs:
  infra_and_app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Terraform Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
      - name: Deploy FastAPI
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-fastapi-prod'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend